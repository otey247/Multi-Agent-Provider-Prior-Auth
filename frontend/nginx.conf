server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api requests to backend container
    location /api/ {
        proxy_pass ${BACKEND_URL};

        # TLS: send correct SNI so Container Apps ingress routes to backend
        proxy_ssl_server_name on;

        # Forward backend hostname (not frontend) so ingress recognises the target app
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP/1.1 + no buffering required for SSE streaming
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;

        # Long timeout for agent processing (agents can take 60s+)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # Proxy /health to backend for monitoring
    location /health {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
    }

    # SPA catch-all: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Next.js static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Foundry Hosted Agent descriptor — Clinical Reviewer Agent
#
# Deployed by scripts/register_agents.py (builds the agent via AIProjectClient),
# NOT via `az ai agent deploy --file agent.yaml`. This file is a human-readable
# descriptor of the agent's shape.
#
# MCP tools (ICD-10, PubMed, ClinicalTrials.gov) are provided through the Foundry
# Toolbox "clinical-tools" (see scripts/create_toolbox.py), which Foundry proxies
# to the self-hosted mcp-medical-data container + PubMed. At runtime the agent
# resolves the toolbox endpoint from TOOLBOX_ENDPOINT, or — if unset — derives it
# from AZURE_AI_PROJECT_ENDPOINT + TOOLBOX_NAME (see _toolbox_url in main.py).
# It does not read per-server MCP URLs.

name: clinical-reviewer-agent
description: >
  Validates ICD-10 diagnosis codes, extracts clinical indicators with
  confidence scoring, searches PubMed literature and ClinicalTrials.gov,
  and returns a structured clinical profile for downstream coverage assessment.
runtime: agent-framework
version: "1.0.0"

resources:
  cpu: "1"
  memory: "2Gi"

env:
  # Microsoft Foundry project endpoint (injected by Foundry at deploy time)
  - name: AZURE_AI_PROJECT_ENDPOINT
    secretRef: azure-ai-project-endpoint

  # Model deployment to use (gpt-5.4 recommended for clinical reasoning depth)
  - name: AZURE_OPENAI_DEPLOYMENT_NAME
    value: gpt-5.4

  # MCP tools (ICD-10, PubMed, ClinicalTrials.gov) come from the Foundry Toolbox
  # "clinical-tools". register_agents.py injects TOOLBOX_ENDPOINT; if it is unset
  # the agent derives the toolbox URL from AZURE_AI_PROJECT_ENDPOINT + TOOLBOX_NAME.
  # The retired mcp.deepsense.ai per-server URLs were removed (never read).

  # Azure Application Insights (optional)
  - name: APPLICATION_INSIGHTS_CONNECTION_STRING
    secretRef: app-insights-connection-string

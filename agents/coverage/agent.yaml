# Foundry Hosted Agent descriptor — Coverage Assessment Agent
#
# Deployed by scripts/register_agents.py (builds the agent via AIProjectClient),
# NOT via `az ai agent deploy --file agent.yaml`. This file is a human-readable
# descriptor of the agent's shape.
#
# MCP tools (NPI Registry, CMS Coverage) are provided through the Foundry Toolbox
# "coverage-tools" (see scripts/create_toolbox.py), which Foundry proxies to the
# self-hosted mcp-medical-data container. The agent reads TOOLBOX_ENDPOINT at
# runtime — it does not read per-server MCP URLs.

name: coverage-assessment-agent
description: >
  Verifies provider NPI credentials, searches Medicare NCDs/LCDs via CMS
  Coverage MCP, maps clinical findings to policy criteria with
  MET/NOT_MET/INSUFFICIENT assessment, and produces documentation gap analysis.
runtime: agent-framework
version: "1.0.0"

resources:
  cpu: "1"
  memory: "2Gi"

env:
  # Microsoft Foundry project endpoint (injected by Foundry at deploy time)
  - name: AZURE_AI_PROJECT_ENDPOINT
    secretRef: azure-ai-project-endpoint

  # Model deployment to use (gpt-5.4 recommended for coverage criteria assessment)
  - name: AZURE_OPENAI_DEPLOYMENT_NAME
    value: gpt-5.4

  # MCP tools (NPI Registry, CMS Coverage) come from the Foundry Toolbox
  # "coverage-tools" via TOOLBOX_ENDPOINT, injected at registration time by
  # scripts/register_agents.py. The retired mcp.deepsense.ai per-server URLs were
  # removed (the agent never read these env vars).

  # Azure Application Insights (optional)
  - name: APPLICATION_INSIGHTS_CONNECTION_STRING
    secretRef: app-insights-connection-string

  <rect x="138" y="766" width="804" height="92" rx="18" fill="url(#agent)" filter="url(#softSm)"/>
  <text x="540" y="804" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Coverage Agent</text>
  <text x="540" y="832" text-anchor="middle" font-size="12" fill="#EEE7FF">Provider verification, CMS policy lookup, and criteria mapping</text>
  <rect x="736" y="818" width="64" height="24" rx="8" fill="#0B7A18"/>
  <text x="768" y="834" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">npi</text>
  <rect x="812" y="818" width="64" height="24" rx="8" fill="#0B7A18"/>
  <text x="844" y="834" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">cms</text>

  <line x1="540" y1="858" x2="540" y2="896" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="138" y="900" width="804" height="126" rx="18" fill="url(#agent)" filter="url(#softSm)"/>
  <text x="172" y="940" font-size="16" font-weight="700" fill="#FFFFFF">PHASE 3 — HOSTED SYNTHESIS AGENT</text>
  <text x="540" y="968" text-anchor="middle" font-size="12" fill="#EEE7FF">Foundry applies the decision rubric and returns a stable recommendation payload</text>
  <rect x="170" y="986" width="216" height="32" rx="10" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="278" y="1006" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gate 1 — Provider valid?</text>
  <rect x="432" y="986" width="216" height="32" rx="10" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="540" y="1006" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gate 2 — Codes valid?</text>
  <rect x="694" y="986" width="216" height="32" rx="10" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="802" y="1006" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">Gate 3 — Medical necessity?</text>

  <line x1="540" y1="1026" x2="540" y2="1066" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="210" y="1074" width="660" height="92" rx="18" fill="url(#success)" filter="url(#soft)"/>
  <text x="540" y="1112" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">PHASE 4 — ACA BACKEND AUDIT + CONFIDENCE OUTPUTS</text>
  <text x="540" y="1140" text-anchor="middle" font-size="12" fill="#D8F8DB">PDF justification, source attribution, and final response shaping remain in the backend</text>

  <line x1="540" y1="1166" x2="540" y2="1206" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="262" y="1214" width="556" height="72" rx="36" fill="url(#decision)" filter="url(#soft)"/>
  <text x="540" y="1258" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Human Decision Panel — Accept / Override → Final PDF Outputs</text>

  <rect x="34" y="1060" width="156" height="214" rx="14" fill="#FFFFFF" stroke="#D9E2F0" filter="url(#softSm)"/>
  <text x="52" y="1090" font-size="11" font-weight="700" fill="#27466D">Legend</text>
  <rect x="52" y="1106" width="16" height="16" rx="4" fill="url(#agent)"/>
  <text x="78" y="1119" font-size="10" fill="#425F82">Hosted agent</text>
  <rect x="52" y="1132" width="16" height="16" rx="4" fill="#0B7A18"/>
  <text x="78" y="1145" font-size="10" fill="#425F82">MCP tool</text>
  <rect x="52" y="1158" width="16" height="16" rx="4" fill="url(#backend)"/>
  <text x="78" y="1171" font-size="10" fill="#425F82">ACA backend</text>
  <rect x="52" y="1184" width="16" height="16" rx="4" fill="url(#decision)"/>
  <text x="78" y="1197" font-size="10" fill="#425F82">Human decision</text>
  <g transform="translate(48 1212) scale(0.10)">
    <use href="#foundryIcon"/>
  </g>
  <text x="78" y="1240" font-size="10" fill="#425F82">Foundry Agent Service</text>
</svg>

    <use href="#foundryIcon"/>
  </g>
  <text x="102" y="58" font-size="30" font-weight="700" fill="#FFFFFF">Agentic Architecture — Hosted Agent Pipeline</text>
  <text x="102" y="84" font-size="14" font-weight="500" fill="#D9EEFF">ACA orchestrates. Foundry hosts the specialist agents.</text>

  <rect x="374" y="152" width="332" height="68" rx="34" fill="#2D76D2" filter="url(#softSm)"/>
  <text x="540" y="193" text-anchor="middle" font-size="20" font-weight="700" fill="#FFFFFF">PA Request Intake</text>

  <line x1="540" y1="220" x2="540" y2="258" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="286" y="268" width="508" height="108" rx="18" fill="url(#backend)" filter="url(#soft)"/>
  <text x="540" y="308" text-anchor="middle" font-size="22" font-weight="700" fill="#FFFFFF">FastAPI Compatibility Layer + Orchestrator</text>
  <text x="540" y="336" text-anchor="middle" font-size="13" fill="#D9EEFF">Validation, SSE progress, fan-out/fan-in coordination, and audit assembly</text>

  <line x1="540" y1="376" x2="540" y2="414" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="34" y="424" width="1012" height="638" rx="22" fill="url(#foundryBand)" stroke="#DDD6FE" filter="url(#soft)"/>
  <text x="70" y="468" font-size="19" font-weight="700" fill="#4338CA">Microsoft Foundry Agent Service</text>

  <text x="70" y="510" font-size="15" font-weight="700" fill="#4B2B85">PHASE 1 — PARALLEL SPECIALIST REVIEW</text>

  <rect x="70" y="530" width="442" height="154" rx="18" fill="url(#agent)" filter="url(#softSm)"/>
  <text x="291" y="572" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Compliance Agent</text>
  <text x="291" y="604" text-anchor="middle" font-size="12" fill="#EEE7FF">Documentation completeness</text>
  <text x="291" y="626" text-anchor="middle" font-size="12" fill="#EEE7FF">Demographics and submission readiness</text>
  <rect x="190" y="644" width="202" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.16"/>
  <text x="291" y="662" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">No MCP tools</text>

  <rect x="568" y="530" width="442" height="154" rx="18" fill="url(#agent)" filter="url(#softSm)"/>
  <text x="789" y="572" text-anchor="middle" font-size="17" font-weight="700" fill="#FFFFFF">Clinical Agent</text>
  <text x="789" y="604" text-anchor="middle" font-size="12" fill="#EEE7FF">ICD-10 validation and clinical evidence extraction</text>
  <text x="789" y="626" text-anchor="middle" font-size="12" fill="#EEE7FF">Returns structured findings for downstream coverage review</text>
  <rect x="654" y="644" width="78" height="28" rx="8" fill="#0B7A18"/>
  <text x="693" y="662" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">icd10</text>
  <rect x="744" y="644" width="90" height="28" rx="8" fill="#0B7A18"/>
  <text x="789" y="662" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">pubmed</text>
  <rect x="846" y="644" width="90" height="28" rx="8" fill="#0B7A18"/>
  <text x="891" y="662" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">trials</text>

  <line x1="540" y1="684" x2="540" y2="726" stroke="#93A7C4" stroke-width="2.5" marker-end="url(#arrow)"/>

